stages:
  - build
  - test
  - package
  - deploy

# This is for cache - .m2/repository/ (maven will save files in project directory, not in home folder)
variables:
  MAVEN_OPTS: "-Dmaven.repo.local=$CI_PROJECT_DIR/.m2/repository"

cache:
  paths:
    - .m2/repository/

build-job:
  stage: build
  image: maven:3.9-amazoncorretto-21-alpine
  artifacts:
    name: "TH_build-job_$CI_COMMIT_TITLE"
    paths:
      - main-server/target/
      - breakage-server/target/
      - gateway/target/
      - common-module/target/
    expire_in: 10 minutes
  before_script:
    - echo "==================== start build-job ===================="
  after_script:
    - echo "==================== finish build-job ===================="
  script:
    - mvn clean compile

test-job:
  stage: test
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
  image: maven:3.9-amazoncorretto-21-alpine
  services:
    - docker:27-dind
  before_script:
    - echo "==================== start test-job ===================="
  after_script:
    - echo "==================== finish test-job ===================="
  script:
    - mvn test
  dependencies:
    - build-job

package-job:
  stage: package
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
  image: maven:3.9-amazoncorretto-21-alpine
  services:
    - docker:27-dind
  artifacts:
    name: "TH_package-job_$CI_COMMIT_TITLE"
    paths:
      - main-server/target/*.jar
      - main-server/target/*.jar.original
      - breakage-server/target/*.jar
      - breakage-server/target/*.jar.original
      - gateway/target/*.jar
      - gateway/target/*.jar.original
      - common-module/target/*.jar
    expire_in: 10 minutes
  before_script:
    - echo "==================== start package-job ===================="
  after_script:
    - echo "==================== finish package-job ===================="
  script:
    - mvn package -Dmaven.test.skip=true
  dependencies:
    - build-job
#  only:
#    - main

deploy-job:
  stage: deploy
  variables:
    DOCKER_HOST: unix:///var/run/docker.sock
    DOCKER_CLIENT_TIMEOUT: 120
    COMPOSE_HTTP_TIMEOUT: 120
  image: docker:27-cli
  before_script:
    - echo "==================== start deploy-job ===================="
  after_script:
    - echo "==================== finish deploy-job ===================="
  script:
    - docker compose build
    - docker compose up -d
  dependencies:
    - build-job
    - package-job
#  only:
#    - main